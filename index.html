<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTINHA DO DESAFIO DO GUINHO</title>
    <style>
        /* CONFIGURAÇÕES ORIGINAIS (NÃO MEXER) */
        :root {
            --primary-orange: #f39c12;
            --table-header: #34495e;
            --accent-red: #e74c3c;
            --whatsapp-green: #25d366;
            --result-blue: #3498db;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #fce5cd;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            background-color: var(--primary-orange);
            width: 100%;
            max-width: 600px;
            text-align: center;
            padding: 15px 10px;
            border: 3px solid #000;
            box-shadow: 4px 4px 0px #000;
            margin-bottom: 20px;
        }

        .header h1 { margin: 0; font-size: 1.4rem; text-transform: uppercase; font-weight: 900; }

        .container {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .selector-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .dezena {
            padding: 12px 5px;
            border: 2px solid #ccc;
            background: #fff;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            font-size: 1rem;
            display: flex; justify-content: center; align-items: center;
        }

        .dezena.selected { background-color: var(--accent-red); color: white; border-color: #c0392b; }
        .dezena.res-selected { background-color: var(--result-blue); color: white; border-color: #2980b9; }

        .info-box {
            background: #e8f4fd;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            font-weight: bold;
            border: 1px solid #d1e9f9;
            font-size: 0.9rem;
        }

        .btn-group { display: flex; gap: 10px; margin: 10px 0; }
        
        .btn-acao {
            flex: 1;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn-gerar { background: #27ae60; }
        .btn-limpar { background: #95a5a6; }
        .btn-compartilhar { background: var(--whatsapp-green); width: 100%; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;}

        .table-responsive { width: 100%; overflow-x: auto; margin-top: 15px; border: 1px solid #ddd; }

        table { width: 100%; border-collapse: collapse; background: white; min-width: 650px; }

        th, td { border: 1px solid #000; padding: 6px 3px; text-align: center; font-size: 0.8rem; }

        th { background: var(--table-header); color: white; }
        .line-number { background: var(--primary-orange); font-weight: bold; width: 35px; }
        .col-acertos { background: #eee; font-weight: bold; width: 60px; font-size: 1rem; }
        .premium { background-color: #d4edda !important; font-weight: bold; }
        .hit-cell { background-color: #f1c40f; color: black; font-weight: bold; }

        footer { margin: 30px 0 20px 0; font-weight: bold; font-size: 1rem; color: #333; text-align: center; }

        /* CSS DA TELA DE SENHA (ESTILO MODAL) */
        #travaSeguranca {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fce5cd;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .box-senha {
            background: white;
            padding: 30px;
            border-radius: 10px;
            border: 4px solid #000;
            box-shadow: 6px 6px 0px #000;
            text-align: center;
            width: 100%;
            max-width: 350px;
        }
        .input-senha {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #ccc;
            border-radius: 5px;
            font-size: 1.2rem;
            text-align: center;
        }
        .btn-entrar {
            width: 100%;
            background: var(--primary-orange);
            padding: 15px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="travaSeguranca">
        <div class="box-senha">
            <h2 style="margin-top:0">🔒 ACESSO RESTRITO</h2>
            <p>Informe a senha de acesso:</p>
            <input type="password" id="campoSenha" class="input-senha" placeholder="SENHA">
            <button class="btn-entrar" onclick="conferirSenha()">ACESSAR SITE</button>
            <p id="msgErro" style="color:red; display:none; font-weight:bold; margin-top:10px">SENHA INCORRETA!</p>
        </div>
    </div>

    <div class="header">
        <h1>LOTINHA DO DESAFIO DO GUINHO</h1>
    </div>

    <div class="container">
        <h3 style="color: var(--accent-red); margin-top:0;">1. TIRE 3 DEZENAS</h3>
        <div class="selector-grid" id="gridExcluir"></div>
        <div class="info-box" id="statusExcluir">Aguardando seleção...</div>

        <div class="btn-group">
            <button class="btn-acao btn-limpar" onclick="limparTudo()">LIMPAR</button>
            <button class="btn-acao btn-gerar" onclick="gerarFechamento()">GERAR JOGOS</button>
        </div>

        <div id="resultadoArea" style="display:none;">
            <hr style="margin:20px 0">
            <h3 style="color: var(--result-blue);">2. CONFERIDOR DE RESULTADO</h3>
            <div class="selector-grid" id="gridConferir"></div>
            <div class="info-box" id="statusConferir">Marque os 15 sorteados.</div>
            
            <button class="btn-acao btn-compartilhar" onclick="compartilhar()">📲 COMPARTILHAR JOGOS</button>
            
            <div class="table-responsive">
                <table id="tabelaJogos">
                    <thead><tr id="headerTabela"></tr></thead>
                    <tbody id="corpoTabela"></tbody>
                </table>
            </div>
        </div>
    </div>

    <footer>CRIADO POR GUINHO LOTOFACIL</footer>

    <script>
        // LÓGICA DA SENHA
        function conferirSenha() {
            const senha = document.getElementById('campoSenha').value;
            if (senha === "DESAFIO2@26") {
                document.getElementById('travaSeguranca').style.display = 'none';
                localStorage.setItem('guinho_auth', 'ok');
            } else {
                document.getElementById('msgErro').style.display = 'block';
                setTimeout(() => { document.getElementById('msgErro').style.display = 'none'; }, 2000);
            }
        }

        // LÓGICA ORIGINAL DO SITE
        let excluidas = [];
        let sorteados = [];
        let jogosGerados = [];

        window.onload = () => {
            if (localStorage.getItem('guinho_auth') === 'ok') {
                document.getElementById('travaSeguranca').style.display = 'none';
            }
            initGrids();
        };

        function initGrids() {
            const gExcluir = document.getElementById('gridExcluir');
            const gConferir = document.getElementById('gridConferir');
            gExcluir.innerHTML = ''; gConferir.innerHTML = '';
            for (let i = 1; i <= 25; i++) {
                let n = i.toString().padStart(2, '0');
                let btnE = document.createElement('div');
                btnE.className = 'dezena'; btnE.innerText = n;
                btnE.onclick = () => {
                    if(excluidas.includes(i)) excluidas = excluidas.filter(x => x !== i);
                    else if(excluidas.length < 3) excluidas.push(i);
                    atualizarVisual();
                };
                gExcluir.appendChild(btnE);

                let btnC = document.createElement('div');
                btnC.className = 'dezena'; btnC.innerText = n;
                btnC.onclick = () => {
                    if(sorteados.includes(i)) sorteados = sorteados.filter(x => x !== i);
                    else if(sorteados.length < 15) sorteados.push(i);
                    conferirJogos();
                };
                gConferir.appendChild(btnC);
            }
        }

        function atualizarVisual() {
            const btns = document.querySelectorAll('#gridExcluir .dezena');
            btns.forEach((b, i) => {
                if(excluidas.includes(i+1)) b.classList.add('selected');
                else b.classList.remove('selected');
            });
            document.getElementById('statusExcluir').innerText = excluidas.length === 3 ? 
                `Excluindo: ${excluidas.sort((a,b)=>a-b).map(n=>n.toString().padStart(2,'0')).join(' - ')}` : "Selecione 3 dezenas.";
        }

        function gerarFechamento() {
            if(excluidas.length !== 3) return alert("Selecione 3 dezenas primeiro.");
            let base = [];
            for(let i=1; i<=25; i++) if(!excluidas.includes(i)) base.push(i);
            jogosGerados = [];
            for(let j=0; j<6; j++) {
                let jogo = [...base];
                jogo.splice(j, 1);
                jogosGerados.push(jogo);
            }
            document.getElementById('resultadoArea').style.display = 'block';
            conferirJogos();
        }

        function conferirJogos() {
            const btns = document.querySelectorAll('#gridConferir .dezena');
            btns.forEach((b, i) => {
                if(sorteados.includes(i+1)) b.classList.add('res-selected');
                else b.classList.remove('res-selected');
            });
            document.getElementById('statusConferir').innerText = `Sorteados: ${sorteados.length}/15`;
            const corpo = document.getElementById('corpoTabela');
            const header = document.getElementById('headerTabela');
            header.innerHTML = '<th>Jogo</th>' + Array.from({length: 21}, (_, i) => `<th>${i+1}</th>`).join('') + '<th>Acertos</th>';
            corpo.innerHTML = '';
            jogosGerados.forEach((jogo, idx) => {
                let acertos = jogo.filter(n => sorteados.includes(n)).length;
                let tr = document.createElement('tr');
                if(acertos === 15) tr.className = 'premium';
                let html = `<td class="line-number">${idx+1}</td>`;
                jogo.forEach(num => {
                    let classe = sorteados.includes(num) ? 'hit-cell' : '';
                    html += `<td class="${classe}">${num.toString().padStart(2, '0')}</td>`;
                });
                html += `<td class="col-acertos">${acertos}</td>`;
                tr.innerHTML = html;
                corpo.appendChild(tr);
            });
        }

        function limparTudo() {
            excluidas = []; sorteados = []; jogosGerados = [];
            document.getElementById('resultadoArea').style.display = 'none';
            atualizarVisual();
            initGrids();
        }

        async function compartilhar() {
            let texto = `*LOTINHA DO DESAFIO DO GUINHO*\n\n`;
            jogosGerados.forEach((j, i) => {
                texto += `*J${i+1}:* ${j.map(n => n.toString().padStart(2, '0')).join(' ')}\n`;
            });
            texto += `\n_Criado por Guinho Lotofacil_`;
            if (navigator.share) await navigator.share({ title: 'Jogos do Guinho', text: texto });
            else { navigator.clipboard.writeText(texto); alert("Jogos Copiados!"); }
        }
    </script>
</body>
</html>
